<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1 id="title">DOM Manipulation Practice</h1>
        <p class="text">Javascript is a single-threaded Language</p>
        <p class="text">Learning javascript DOM is fun!!!</p>

        <div class="btn-group">
            <button id="change-btn">Change Content</button>
            <button id="add-btn">Add Element</button>
            <button id="remove-item">Remove Title</button>
        </div>

        <div id="container"></div>
        

        <h2>Input Event Example</h2>
        <input type="text" id="nameInput" placeholder="Something write here...">
        <p id="output">Text will Appear here.</p>
        <h2>Submit Event Example</h2>

        <form id="myForm">
            <input type="text" placeholder="Enter Your Name" required>
            <br>
            <button type="submit">Submit</button>
        </form>
        <p id="message"></p>
    </div>

    <script src="./main.js"></script>
</body>
</html>
